name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.3.1

    - name: Restore NuGet packages
      run: nuget restore ${{ vars.SOLUTION }}

    - name: Build Solution
      run: msbuild.exe ${{ vars.SOLUTION }} /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.7.2

    - name: Create Zip Archive
      shell: powershell
      run: |
        $tag = "${{ gitea.ref }}" -replace '^refs/tags/', ''
        $tag2 = "$env:GITEA_REF_NAME"
        echo "Tag: $tag"
        echo "Tag2: $tag2"
        Compress-Archive -Path ".\bin\Release\*" -DestinationPath "converter-$env:GITEA_REF_NAME.zip"

    - name: Upload to Release
      env:
        GITEA_TOKEN: ${{ secrets.TOKEN }}
      shell: powershell
      run: |
        dir
        $tag = "$env:GITEA_REF_NAME"
        $fileName = ".\converter-$tag.zip"
        $repo = "${{ gitea.repository }}"
        $gitea_url = "${{ vars.URL }}"
        $apiUrl = "$gitea_url/api/v1/repos/$repo/releases/tags/$tag/assets?name=$fileName"
        
        if(-Not (Test-Path $fileName)) {
            throw "Archive file $fileName not found!"
        }
        
        $headers = @{
          Authorization = "token $env:GITEA_TOKEN"
          "Content-Type" = "application/zip"
        }

        Invoke-WebRequest -Uri $apiUrl -Headers $headers -Method Post -InFile $fileName -UseBasicParsing