name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.3.1

    - name: Restore NuGet packages
      run: nuget restore ${{ vars.SOLUTION }}

    - name: Build Solution
      run: msbuild.exe ${{ vars.SOLUTION }} /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.7.2

    - name: Create Zip Archive
      shell: powershell
      run: |
        $tag = "${{ gitea.ref }}" -replace '^refs/tags/', ''
        Compress-Archive -Path ".\bin\Release\*" -DestinationPath "converter-$tag.zip"

    - name: Upload to Release
      env:
        GITEA_TOKEN: ${{ secrets.TOKEN }}
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        
        $ref = "${{ gitea.ref }}"
        $tag = $ref -replace '^refs/tags/', ''
        Write-Host "Processing tag: $tag"

        $fileName = "converter-$tag.zip"

        $repo = "${{ gitea.repository }}"
        $base = "${{ vars.URL }}"

        # Try to get existing release
        try {
          $releaseInfo = Invoke-RestMethod -Headers @{ Authorization = "token $env:GITEA_TOKEN" } `
            -Uri "$base/api/v1/repos/$repo/releases/tags/$tag" `
            -Method Get
          Write-Host "Release found: $($releaseInfo.id)"
        } catch {
          # If release not found, create a new one
          Write-Host "Release not found, creating new one..."
          $releaseData = @{
            tag_name = $tag
            name = $tag
            body = "Release $tag"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $releaseInfo = Invoke-RestMethod -Headers @{ 
            Authorization = "token $env:GITEA_TOKEN"
            "Content-Type" = "application/json"
          } -Uri "$base/api/v1/repos/$repo/releases" `
            -Method Post `
            -Body $releaseData
          Write-Host "Release created: $($releaseInfo.id)"
        }

        $releaseId = $releaseInfo.id

        # Upload file
        $apiUrl = "$base/api/v1/repos/$repo/releases/$releaseId/assets?name=$fileName"
        
        $filePath = Resolve-Path $fileName
        
        Invoke-RestMethod -Headers @{ Authorization = "token $env:GITEA_TOKEN" } `
          -Uri $apiUrl `
          -Method Post `
          -InFile $filePath `
          -ContentType "application/zip"
        
        Write-Host "File successfully uploaded to release"
