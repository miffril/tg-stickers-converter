name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Restore NuGet packages
        run: nuget restore Converter.csproj

      - name: Build Solution
        run: msbuild.exe Converter.csproj /p:Configuration=Release /p:Platform="Any CPU" /p:TargetFrameworkVersion=v4.7.2

      - name: Create Zip Archive
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path ".\bin\Release\*" -DestinationPath "converter-$tag.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: converter-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
